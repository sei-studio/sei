name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            build_cmd: dist:mac
            artifact_name: mac
          - os: windows-latest
            build_cmd: dist:win
            artifact_name: win
          - os: ubuntu-latest
            build_cmd: dist:linux
            artifact_name: linux

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build (${{ matrix.os }})
        env:
          # Build-time config injected into the bundle (see electron.vite.config.ts).
          # SUPABASE_* + SEI_PROXY_URL are public-by-design (RLS is the security
          # gate). If these repo secrets are unset, cloud mode is disabled in the
          # build but local (BYOK) mode + the build itself are unaffected.
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SEI_PROXY_URL: ${{ secrets.SEI_PROXY_URL }}
          # macOS Developer ID signing + notarytool. Empty on Win/Linux; harmless.
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run ${{ matrix.build_cmd }}

      - name: Verify cloud config baked into bundle
        # v0.2.0 shipped with empty SUPABASE_URL/ANON because the build-time
        # define injection silently produced "" — getClient() then throws
        # SUPABASE_ENV_MISSING and ALL cloud paths (Google OAuth, email sign-in,
        # World/browse) die. This gate makes that impossible to ship again:
        # we require the real Supabase host to actually appear in dist/main.
        # Test stubs use stub/test/example.supabase.co, so matching the real
        # project host cannot be satisfied by accident.
        shell: bash
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "::error::SUPABASE_URL / SUPABASE_ANON_KEY repo secret is empty — cloud sign-in would ship broken. Set them in repo Settings → Secrets."
            exit 1
          fi
          host="${SUPABASE_URL#https://}"; host="${host%%/*}"
          if ! grep -rqF "$host" dist/main; then
            echo "::error::SUPABASE_URL was set but '$host' is NOT in dist/main — build-time define injection failed (check electron.vite.config.ts)."
            exit 1
          fi
          if ! grep -rqF "$SUPABASE_ANON_KEY" dist/main; then
            echo "::error::SUPABASE_ANON_KEY was set but not baked into dist/main — define injection failed."
            exit 1
          fi
          echo "✓ cloud config baked in ($host + anon key present in dist/main)"

      - name: Collect release assets (installers + auto-update feed)
        # CRITICAL: electron-updater needs the *.yml feed files, the macOS *.zip
        # (the mac auto-update payload — the dmg is download-only), and *.blockmap
        # files. Uploading only the dmg/exe silently breaks auto-update. Grab
        # every publishable artifact from release/ (nullglob drops the misses).
        shell: bash
        run: |
          shopt -s nullglob
          assets=(release/*.dmg release/*.zip release/*.exe release/*.AppImage release/*.blockmap release/latest*.yml)
          mkdir -p dist-release
          cp "${assets[@]}" dist-release/
          echo "Collected for ${{ matrix.artifact_name }}:"
          ls -1 dist-release/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sei-${{ matrix.artifact_name }}
          path: dist-release/
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List collected assets
        run: find artifacts -type f | sort

      - name: Create GitHub Release (draft — review assets before publishing)
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
          draft: true
          prerelease: ${{ contains(github.ref_name, '-') }}
