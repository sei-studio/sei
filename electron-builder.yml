# electron-builder.yml — Phase 4 final.
# Source: .planning/phases/04-electron-gui-packaging/04-RESEARCH.md §"Code Examples §3 + §4"
#         + §"Resolved During Plan-Phase" Q1, Q2, Q3.
#
# appId is LOCKED for v1. Any future change strands every existing user's
# safeStorage Keychain entry on macOS and Windows DPAPI scope on Windows —
# treat as irrevocable. See Phase 8 Plan 01 HOTSPOTS row 12 + threat T-08-01.

# Locked 2026-05-17 (Phase 8 Plan 01 Task 2 — resolves Phase 4 04-10 BLOCKING).
appId: com.sei.app
productName: Sei
copyright: Copyright (c) 2026 Sei

# In-app auto-update (quick/260604-uoy — reverses D-63, see note at EOF).
# electron-updater pulls the latest release + the generated metadata files
# (latest-mac.yml / latest.yml / latest-linux.yml) from the GitHub Releases of
# this owner/repo. Adding `publish` is also what makes electron-builder emit the
# `app-update.yml` baked into the packaged app — without it `autoUpdater` has no
# feed to check. owner/repo MUST match the real GitHub repository that hosts the
# releases (USER-ACTION: verify the generated app-update.yml owner before the
# first release; a mismatch silently checks the wrong repo).
publish:
  provider: github
  owner: sei-studio
  repo: sei

directories:
  output: release
  buildResources: build

# Inclusive: pack the whole repo, then carve out planning docs, dev-only
# tooling, build outputs, personal/user state, and gitignored items.
files:
  - "**/*"
  # build outputs that get regenerated
  - "!release/**"
  - "!out/**"
  # planning + docs (project history, not shipped)
  - "!.planning/**"
  - "!docs/**"
  - "!ARCHITECTURE.md"
  - "!RELEASE-NOTES.md"
  - "!README.md"
  - "!CLAUDE.md"
  # tooling / CI / git
  - "!.github/**"
  - "!.git/**"
  - "!.gitignore"
  - "!.claude/**"
  - "!test/**"
  - "!scripts/**"
  - "!tsconfig*.json"
  - "!electron.vite.config.ts"
  - "!electron-builder.yml"
  # local logs / personal state
  - "!logs/**"
  - "!memory/**"
  - "!config.json"
  - "!config.example.json"
  - "!.env*"
  # sibling working copies / forks
  - "!mineflayer/**"
  # source maps + node_modules trim
  - "!**/*.map"
  - "!**/node_modules/*/{test,tests,__tests__,*.md,*.markdown,LICENSE*,license*}"

# Stable filenames so https://github.com/sei-studio/sei/releases/latest/download/<name>
# resolves correctly from sei.gg regardless of version bump.
artifactName: Sei-${os}-${arch}.${ext}

asar: true
extraResources:
  - from: build/icon.png
    to: icon.png

asarUnpack:
  - "src/bot/**/*"
  # node_modules must be unpacked so the bot (running from app.asar.unpacked
  # via utilityProcess.fork) can resolve its deps (zod, mineflayer, etc.) —
  # Node ESM resolution from an unpacked file cannot cross back into the asar.
  - "node_modules/**/*"
  # Phase 9 (09-01): bundled default skin PNGs must survive packaging so the
  # local skin HTTP server (Plan 03) can resolve `source: 'bundled'` personas
  # via fs.readFile under process.resourcesPath in the packaged build.
  - "resources/skins/**/*"

mac:
  category: public.app-category.games
  # Separate arm64 + x64 builds (not universal): the universal merge step in
  # @electron/asar bails with "pattern is too long" when asarUnpack covers
  # node_modules/**/*.
  #
  # ZIP-ONLY (dmg dropped 2026-06-21): the bundled prismarine-viewer texture tree
  # is ~32k tiny files. dmgbuild auto-sizes the DMG volume from the byte-sum of
  # the .app (+~10%), which badly understates the APFS per-file block/inode
  # overhead of 32k files — so `ditto` overflows the mounted volume with
  # "No space left on device" even with 40GB+ free on the runner. There is no
  # electron-builder knob to pad the DMG size, and the textures can't move into
  # the asar (node-canvas reads them via native fs, which bypasses Electron's
  # asar layer). The zip is ALSO the macOS auto-update payload (latest-mac.yml +
  # app-update.yml reference it), so zip-only loses nothing functional; mac users
  # unzip and drag to /Applications. Re-add a `dmg` target here if the
  # texture-count/sizing problem is solved (e.g. prune textures to 1.20-1.21).
  #
  # arm64-only (2026-06-21): validate Apple Silicon + Windows first; x64 (Intel)
  # mac is re-added below once those are confirmed. Re-add `x64` to the arch list
  # to restore Intel coverage.
  target:
    - target: zip
      arch: [arm64]
  hardenedRuntime: true
  gatekeeperAssess: false
  identity: "Shang Wang (7485LZ74DA)"   # electron-builder prepends "Developer ID Application:" itself
  notarize: true   # team id comes from APPLE_TEAM_ID env var (.env.local locally; GH Actions secret in CI)
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  # Skip code-signing the prismarine-viewer texture tree (~32k .png/.json/.mcmeta
  # data files under asar.unpacked). They contain NO Mach-O / executable code, so
  # they neither need nor benefit from individual signatures — they stay sealed in
  # the app's CodeResources via the main bundle signature either way. electron-osx-sign
  # otherwise runs `codesign --timestamp` once PER FILE, i.e. 32k sequential Apple
  # timestamp-server round-trips; when that TSA is slow the mac signing step takes
  # 85min+ or stalls indefinitely (a single hung connection wedges the whole serial
  # sign). Excluding them drops signing to a few minutes and removes the stall risk.
  # Scope is deliberately narrow (this texture path only) so real native binaries
  # — canvas/gl .node, Electron Framework — are STILL signed + hardened + notarized.
  signIgnore:
    - "prismarine-viewer/public/textures/"
  # macOS 15+/26 Local Network privacy. Declaring NSLocalNetworkUsageDescription
  # makes the system show the "allow Sei to find devices on your local network"
  # prompt and list Sei under System Settings → Privacy & Security → Local
  # Network. WITHOUT it the packaged app (a distinct TCC identity from the dev
  # Electron binary) silently cannot receive Minecraft's open-to-LAN multicast
  # beacon — the world is detected by `npm run dev` but shows "not connected" in
  # the packaged build. Works together with the multicast entitlement in
  # build/entitlements.mac.plist.
  extendInfo:
    NSLocalNetworkUsageDescription: "Sei finds your Minecraft world when you open it to LAN so your characters can join it on this Mac."

# dmg target dropped 2026-06-21 (see mac.target note above) — config kept,
# commented, for easy re-enable once the 32k-texture-file DMG sizing is solved.
# dmg:
#   sign: false               # default since electron-builder 20.43.0
#   contents:
#     - x: 410
#       y: 220
#       type: link
#       path: /Applications
#     - x: 130
#       y: 220
#       type: file

win:
  target:
    - target: nsis
      arch: [x64]
  # NO signtoolOptions / NO azureSignOptions per RESEARCH §Resolved Q2 (ship unsigned v1).
  # SmartScreen "unknown publisher" warning is accepted UX for v1; documented in plan 11 release notes.

nsis:
  oneClick: false                          # show Welcome / Choose Path
  perMachine: false                        # per-user install — no admin prompt
  allowToChangeInstallationDirectory: true

# Linux (AppImage) dropped 2026-06-20: the prismarine-viewer headless-gl native
# dep won't build on the Linux runner and the target was untested anyway. Re-add a
# `linux:` block + the ubuntu matrix leg in release.yml if/when it's supported.

# D-63 REVERSED (quick/260604-uoy, 2026-06-04): auto-update is now IN scope.
# The notify-and-redirect-to-website updater (updateChecker.ts + UpdateToast.tsx)
# was replaced by a real in-app electron-updater that downloads + installs in
# place over the GitHub Releases channel (see `publish:` above). userData is
# never touched by an update. See .planning/quick/260604-uoy-* for the design.
