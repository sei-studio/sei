  <!-- Sei logomark (4 white bars), centered in the body -->
  <g fill="#ffffff" transform="translate(182,182) scale(207.874)">
    <rect x="0.5291667" y="1.0583333" width="1.0583333" height="0.52916664"/>
    <rect x="1.5875" y="1.5875001" width="1.0583333" height="0.52916664"/>
    <rect x="1.3229166" y="0.79375011" width="1.0583333" height="0.52916664"/>
    <rect x="0.79375005" y="1.8520834" width="1.0583333" height="0.52916664"/>
  </g>
</svg>
